name: nourish_v
description: "Nourish V - AI-Powered Malnutrition Detection for Rural Healthcare"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  flutter_riverpod: ^2.6.1
  fl_chart: ^0.70.2
  flutter_animate: ^4.5.2
  google_fonts: ^6.2.1
  intl: ^0.20.2
  uuid: ^4.5.1

  # Firebase
  firebase_core: ^3.12.1
  cloud_firestore: ^5.6.9
  firebase_auth: ^5.5.1

  # Bhashini Translation API (via HTTP)
  http: ^1.3.0

  # PDF Report Export
  pdf: ^3.11.2
  printing: ^5.14.2

  # Environment variables
  flutter_dotenv: ^5.2.1
  translator: ^1.0.4+1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_launcher_icons: ^0.14.4

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/
    - assets/icon/
    - assets/json/
    - .env

flutter_launcher_icons:
  android: "launcher_icon"
  ios: false
  image_path: "assets/icon/icon.png"
  min_sdk_android: 21
